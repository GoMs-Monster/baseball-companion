<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MLB Companion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="homePage">
    <div class="home-header">
      <div class="home-logo">⚾</div>
      <h1 class="home-title">Baseball Companion</h1>
    </div>
    <div class="home-teams">
      <h2 class="home-section-title">Select Your Team</h2>
      <div id="homeTeamGrid" class="home-team-grid"></div>
    </div>
    <div class="home-scores">
      <h2 class="home-section-title">Today's Scores</h2>
      <div id="homeScoresList" class="home-scores-list"></div>
    </div>
  </div>

  <header id="scorebar">
    <button id="homeBtn" class="home-btn" title="Home">🏠</button>
    <span id="scoreText">Loading...</span>
    <span id="liveInfo"></span>
    <div id="bannerActions">
      <button id="zoneBtn" class="banner-btn" title="Strike Zone">Zone</button>
      <button id="playsBtn" class="banner-btn" title="Plays">Plays</button>
      <button id="statsBtn" class="banner-btn" title="Team Stats">Batting</button>
    </div>
  </header>
  <nav>
    <button data-tab="scorecard">Card</button>
    <button data-tab="box">Box</button>
  </nav>
  <main id="content"></main>
  <footer id="atbat"></footer>
  <div id="leagueScores" class="league-scores"></div>
  <div id="divStandings" class="div-standings"></div>
  <div id="szModal" class="sz-modal">
    <div class="sz-modal-content">
      <span id="szClose" class="sz-modal-close">&times;</span>
      <div id="szModalBody"></div>
    </div>
  </div>
  <div id="zoneModal" class="sz-modal">
    <div class="sz-modal-content sz-modal-wide">
      <span id="zoneClose" class="sz-modal-close">&times;</span>
      <div id="zoneModalBody"></div>
    </div>
  </div>
  <div id="playsModal" class="sz-modal">
    <div class="sz-modal-content sz-modal-wide">
      <span id="playsClose" class="sz-modal-close">&times;</span>
      <div id="playsModalBody"></div>
    </div>
  </div>
  <div id="teamStatsModal" class="sz-modal">
    <div class="sz-modal-content">
      <span id="tsClose" class="sz-modal-close">&times;</span>
      <div id="tsModalBody"></div>
    </div>
  </div>
  <div id="standingsModal" class="sz-modal">
    <div class="sz-modal-content sz-modal-wide">
      <span id="standingsClose" class="sz-modal-close">&times;</span>
      <div id="standingsModalBody"></div>
    </div>
  </div>
  <div id="playerModal" class="sz-modal">
    <div class="sz-modal-content">
      <span id="playerClose" class="sz-modal-close">&times;</span>
      <div id="playerModalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
