<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorebug Widget Prototype</title>
<style>
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    color: #eee;
    gap: 48px;
    padding: 40px 16px;
  }
  .label { margin: 0 0 10px; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; }

  /* === Widget container === */
  .widget {
    width: 320px;
    background: #111;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
  }

  /* === Player bar (header / footer) === */
  .player-bar {
    display: flex;
    align-items: center;
    padding: 5px 12px;
    font-size: 11px;
    background: #0a0a0a;
    gap: 5px;
  }
  .player-bar .lbl { color: #555; font-weight: 700; font-size: 9px; text-transform: uppercase; }
  .player-bar .nm { color: #bbb; font-weight: 600; }
  .player-bar .stat { color: #666; font-size: 10px; font-weight: 600; margin-left: auto; }

  /* === Score section: 2 rows === */
  .score-grid {
    display: grid;
    grid-template-columns: auto auto 1fr auto auto auto;
    align-items: center;
  }

  /* Challenge dots */
  .ch {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 0 6px 0 12px;
    justify-content: center;
  }
  .ch-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #2a2a2a; border: 1px solid #3a3a3a;
  }
  .ch-dot.on { background: #f5c542; border-color: #f5c542; }

  /* Team abbreviation */
  .tm {
    font-size: 16px; font-weight: 800; padding: 10px 0;
    letter-spacing: 0.5px;
  }

  /* Score */
  .sc {
    font-size: 22px; font-weight: 900;
    font-family: 'Courier New', monospace;
    text-align: right; padding: 0 14px 0 4px;
    min-width: 24px;
  }

  /* Inning: spans 2 rows */
  .inn {
    grid-column: 4; grid-row: 1 / 3;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 8px; gap: 0;
  }
  .inn-arrow { font-size: 12px; line-height: 1; color: #555; }
  .inn-arrow.lit { color: #eee; }
  .inn-num { font-size: 22px; font-weight: 900; line-height: 1.2; }

  /* Count + Outs: spans 2 rows */
  .co {
    grid-column: 5; grid-row: 1 / 3;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 8px; gap: 5px;
  }
  .count { font-size: 21px; font-weight: 700; font-family: 'Courier New', monospace; letter-spacing: 1px; }
  .outs { display: flex; gap: 6px; }
  .o-dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: #2a2a2a; border: 1px solid #444;
  }
  .o-dot.on { background: #f5c542; border-color: #f5c542; }

  /* Diamond: spans 2 rows */
  .dia {
    grid-column: 6; grid-row: 1 / 3;
    display: flex; align-items: center; justify-content: center;
    padding: 0 14px 0 6px;
  }
  .dia svg { width: 50px; height: 50px; }
  .b-off { fill: #2a2a2a; stroke: #444; stroke-width: 0.8; }
  .b-on  { fill: #f5c542; stroke: #daa520; stroke-width: 0.8; }

  /* Divider */
  .div { height: 1px; background: #222; }

  /* Matchup bar (for pre-game) */
  .mu {
    display: flex; justify-content: center; align-items: center;
    padding: 7px 12px; font-size: 12px; gap: 6px;
  }
  .mu .lbl { color: #555; font-weight: 700; font-size: 10px; text-transform: uppercase; }
  .mu .nm { color: #ccc; font-weight: 500; }
  .mu .vs { color: #333; font-size: 10px; padding: 0 4px; }
</style>
</head>
<body>

<!-- ===== LIVE: Top 7th, runner on 2B, 1 out ===== -->
<!-- Away batting: batter header, pitcher footer -->
<div>
  <div class="label">Live — Top 7th, Runner on 2nd</div>
  <div class="widget">
    <div class="player-bar">
      <span class="lbl">AB</span><span class="nm">J. Rodriguez</span><span class="stat">1-3</span>
    </div>
    <div class="score-grid">
      <div class="ch"><div class="ch-dot on"></div><div class="ch-dot on"></div></div>
      <div class="tm" style="color:#00A3E0">SEA</div>
      <div class="sc">3</div>
      <div class="inn">
        <span class="inn-arrow lit">▲</span>
        <span class="inn-num">7</span>
        <span class="inn-arrow">▼</span>
      </div>
      <div class="co">
        <span class="count">1-2</span>
        <div class="outs"><div class="o-dot on"></div><div class="o-dot"></div><div class="o-dot"></div></div>
      </div>
      <div class="dia">
        <svg viewBox="0 0 40 40">
          <rect class="b-off" x="26" y="14" width="10" height="10" rx="1.5" transform="rotate(45 31 19)"/>
          <rect class="b-on"  x="15" y="3"  width="10" height="10" rx="1.5" transform="rotate(45 20 8)"/>
          <rect class="b-off" x="4"  y="14" width="10" height="10" rx="1.5" transform="rotate(45 9 19)"/>
        </svg>
      </div>
      <div class="ch"><div class="ch-dot on"></div><div class="ch-dot"></div></div>
      <div class="tm" style="color:#EB6E1F">HOU</div>
      <div class="sc">1</div>
    </div>
    <div class="player-bar">
      <span class="lbl">P</span><span class="nm">F. Valdez</span><span class="stat">p. 87</span>
    </div>
  </div>
</div>

<!-- ===== LIVE: Bottom 3rd, bases loaded, 2 outs ===== -->
<!-- Home batting: pitcher header, batter footer -->
<div>
  <div class="label">Live — Bases Loaded, 2 Outs</div>
  <div class="widget">
    <div class="player-bar">
      <span class="lbl">P</span><span class="nm">L. Gilbert</span><span class="stat">p. 45</span>
    </div>
    <div class="score-grid">
      <div class="ch"><div class="ch-dot on"></div><div class="ch-dot on"></div></div>
      <div class="tm" style="color:#00A3E0">SEA</div>
      <div class="sc">5</div>
      <div class="inn">
        <span class="inn-arrow">▲</span>
        <span class="inn-num">3</span>
        <span class="inn-arrow lit">▼</span>
      </div>
      <div class="co">
        <span class="count">3-2</span>
        <div class="outs"><div class="o-dot on"></div><div class="o-dot on"></div><div class="o-dot"></div></div>
      </div>
      <div class="dia">
        <svg viewBox="0 0 40 40">
          <rect class="b-on" x="26" y="14" width="10" height="10" rx="1.5" transform="rotate(45 31 19)"/>
          <rect class="b-on" x="15" y="3"  width="10" height="10" rx="1.5" transform="rotate(45 20 8)"/>
          <rect class="b-on" x="4"  y="14" width="10" height="10" rx="1.5" transform="rotate(45 9 19)"/>
        </svg>
      </div>
      <div class="ch"><div class="ch-dot"></div><div class="ch-dot"></div></div>
      <div class="tm" style="color:#EB6E1F">HOU</div>
      <div class="sc">4</div>
    </div>
    <div class="player-bar">
      <span class="lbl">AB</span><span class="nm">Y. Alvarez</span><span class="stat">2-2</span>
    </div>
  </div>
</div>

<!-- ===== FINAL ===== -->
<div>
  <div class="label">Final Score</div>
  <div class="widget">
    <div class="score-grid">
      <div class="ch"><div class="ch-dot"></div><div class="ch-dot"></div></div>
      <div class="tm" style="color:#00A3E0">SEA</div>
      <div class="sc">7</div>
      <div class="inn">
        <span class="inn-num" style="font-size:13px; color:#888; font-weight:600;">FINAL</span>
      </div>
      <div style="grid-column:5/7; grid-row:1/3;"></div>
      <div class="ch"><div class="ch-dot"></div><div class="ch-dot"></div></div>
      <div class="tm" style="color:#EB6E1F">HOU</div>
      <div class="sc">3</div>
    </div>
  </div>
</div>

<!-- ===== PRE-GAME ===== -->
<div>
  <div class="label">Pre-Game</div>
  <div class="widget">
    <div class="player-bar">
      <span class="lbl">SP</span><span class="nm">L. Gilbert</span>
    </div>
    <div class="score-grid">
      <div class="ch"><div class="ch-dot on"></div><div class="ch-dot on"></div></div>
      <div class="tm" style="color:#00A3E0">SEA</div>
      <div class="sc" style="font-size:13px; color:#888; font-weight:600;">38-22</div>
      <div class="inn">
        <span class="inn-num" style="font-size:12px; color:#888; font-weight:600;">7:10 PM</span>
      </div>
      <div style="grid-column:5/7; grid-row:1/3;"></div>
      <div class="ch"><div class="ch-dot on"></div><div class="ch-dot on"></div></div>
      <div class="tm" style="color:#EB6E1F">HOU</div>
      <div class="sc" style="font-size:13px; color:#888; font-weight:600;">30-29</div>
    </div>
    <div class="player-bar">
      <span class="lbl">SP</span><span class="nm">F. Valdez</span>
    </div>
  </div>
</div>

</body>
</html>
